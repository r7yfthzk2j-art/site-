<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 6 місяців</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

/* LOGIN */
.login{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.login input{
    padding:12px 20px;
    border-radius:20px;
    border:none;
    margin-top:15px;
    font-size:16px;
    outline:none;
}

.login button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
    transition:.3s;
}

.login button:hover{
    transform:scale(1.05);
}

.hidden{display:none;}

.hint{margin-top:10px;opacity:0.9;}
.error{margin-top:10px;color:white;}

/* SITE */
.container{
    width:92%;
    max-width:900px;
    margin:auto;
    text-align:center;
}

.screen{
    display:none;
    padding-top:40px;
}

.screen.active{
    display:block;
    animation:fade .5s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(15px);}
    to{opacity:1;transform:translateY(0);}
}

h1{font-size:2.5rem;margin-bottom:20px;}
p{font-size:1.1rem;margin-bottom:25px;line-height:1.6;}

button{
    padding:15px 28px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    font-size:18px;
    transition:.3s;
}

button:hover{transform:scale(1.05);}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:15px;
    margin:25px 0;
}

.card{
    background:rgba(255,255,255,0.18);
    padding:25px;
    border-radius:20px;
    cursor:pointer;
    transition:.3s;
    backdrop-filter:blur(10px);
    min-height:120px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.card:hover{transform:scale(1.05);}

/* MEMORY */
.memory-content img,
.memory-content video{
    width:100%;
    max-width:280px;
    height:auto;
    border-radius:20px;
    margin-top:15px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    object-fit:cover; 
}

@media (max-width:600px){
    .memory-content img,
    .memory-content video{
        max-width:220px;
    }
}
/* PASSWORD */
.passwordBox{
    margin-top:20px;
}

.passwordBox input{
    padding:10px 15px;
    border-radius:20px;
    border:none;
    outline:none;
    margin-top:10px;
}

/* MEDIA ROW */
.media-row{
    display:flex;
    gap:15px;
    justify-content:center;
    align-items:center;
    flex-wrap:wrap;
    margin-top:15px;
}

.media-row img,
.media-row video{
    width:100%;
    max-width:340px;
    border-radius:20px;
}

/* MOBILE */
@media (max-width:600px){
    h1{font-size:1.8rem;}
    p{font-size:1rem;}
    .media-row{flex-direction:column;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="login">
    <h1>🔐</h1>

    <p class="hint">Підказка: який сьогодні день (дд.мм.рр) 🤔</p>

    <input type="password" id="passwordInput" placeholder="Введи пароль">
    <button onclick="checkPassword()">Увійти ❤️</button>

    <p id="error" class="error"></p>
</div>

<!-- SITE -->
<div id="site" class="hidden">

<div class="container">

    <div id="home" class="screen active">
        <h1>❤ Наші найкращі 6 місяців як ми разом ❤</h1>
         <p>Ці пів року були особливими </p>
        <p>Я зібрав для нас маленькі спогади 🫂</p>
        <button id="startBtn">Подивитись спогади</button>
    </div>

    <div id="memories" class="screen">

        <h2>Наші спогади ❤️</h2>

        <div class="cards">

            <div class="card" onclick="showMemory(1)">
                <h3>Перше знайомство</h3>
            </div>

            <div class="card" onclick="showMemory(2)">
                <h3>Перші почуття</h3>
            </div>

            <div class="card" onclick="showMemory(3)">
                <h3>Перше фото</h3>
            </div>

            <div class="card" onclick="showMemory(4)">
                <h3>Родина</h3>
            </div>

        </div>

        <div id="memoryContent">

            <div id="passwordBox" class="passwordBox hidden">
                <h3 id="memoryTitle"></h3>

                <p>Введи пароль 🗣</p>
                <p class="hint">Підсказка: дд.мм.рр</p>

                <input type="password" id="memoryPassword">
                <button onclick="checkMemoryPassword()">Відкрити</button>

                <p id="memoryError" class="error"></p>
            </div>

            <div id="memoryResult"></div>

        </div>

    </div>

</div>

</div>

<script>
const correctPassword = "070626";

const memoryPasswords = {
    1: "061125",
    2: "151125",
    3: "071225",
    4: "010126"
};

let currentMemory = null;

/* LOGIN */
function checkPassword(){
    const input = document.getElementById("passwordInput").value;

    if(input === correctPassword){
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("site").classList.remove("hidden");
    } else {
        document.getElementById("error").textContent = "Ти чо";
    }
}

/* START */
document.getElementById("startBtn").addEventListener("click", () => {
    document.getElementById("home").classList.remove("active");

    setTimeout(() => {
        document.getElementById("memories").classList.add("active");
    }, 200);
});

/* MEMORY */
function showMemory(id){
    currentMemory = id;

    document.getElementById("memoryPassword").value = "";
    document.getElementById("memoryError").textContent = "";

    document.getElementById("passwordBox").classList.remove("hidden");
    document.getElementById("memoryResult").innerHTML = "";

    const title = document.getElementById("memoryTitle");

    if(id === 1) title.textContent = "Спогад 1 ❤";
    if(id === 2) title.textContent = "Спогад 2 ❤";
    if(id === 3) title.textContent = "Спогад 3 ❤";
    if(id === 4) title.textContent = "Спогад 4 ❤";
}

function checkMemoryPassword(){

    const input = document.getElementById("memoryPassword").value;

    if(input === memoryPasswords[currentMemory]){

        document.getElementById("passwordBox").classList.add("hidden");

        const result = document.getElementById("memoryResult");

        if(currentMemory === 1){
            result.innerHTML = `
                <h3>Спогад 1 ❤</h3>
                <img src="photo1.jpg">
                <p>Пам’ятаєш цей день?</p>
            `;
        }

        if(currentMemory === 2){
            result.innerHTML = `
                <h3>Спогад 2 ❤</h3>
                <img src="photo2.jpg">
                <p>А памʼятаєш як ти намагалась скривати 🤪</p>
            `;
        }

        if(currentMemory === 3){
            result.innerHTML = `
                <h3>Спогад 3 ❤</h3>
                <img src="photo3.jpg">
                <p>Сама найкраща фотка</p>
            `;
        }

        if(currentMemory === 4){
            result.innerHTML = `
                <h3>Спогад 4 ❤</h3>

                <div class="media-row">
                    <img src="photo4.jpg">
                    <video controls>
                        <source src="timelapse.mp4" type="video/mp4">
                    </video>
                </div>

                <p>Самий тяжкий етап відносин</p>
            `;
        }

    } else {
        document.getElementById("memoryError").textContent = "Ти чо";
    }
}
</script>

</body>
</html>
